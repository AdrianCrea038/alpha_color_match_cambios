<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Color Match - Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/views/admin.css">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1><i class="fas fa-user-shield"></i> Seguridad Master</h1>
            <div class="user-info">
                <span id="currentUserDisplay"></span>
                <button id="backBtn" class="back-btn"><i class="fas fa-chevron-left"></i> Panel Principal</button>
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <main class="admin-main">
            <div class="premium-card">
                <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; background: rgba(59, 130, 246, 0.03);">
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div style="width: 50px; height: 50px; background: rgba(59, 130, 246, 0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #3b82f6; box-shadow: 0 8px 16px rgba(59, 130, 246, 0.2);">
                            <i class="fas fa-users-gear" style="font-size: 1.5rem;"></i>
                        </div>
                        <div>
                            <h2 style="margin: 0; font-size: 1.4rem; letter-spacing: -0.5px;">Control de Operadores</h2>
                            <p style="font-size: 0.8rem; color: #94a3b8; margin: 4px 0 0 0; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;">Gestión de privilegios y accesos</p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button id="migrateMasterBtn" style="display:none; align-items:center; gap:10px; background:linear-gradient(135deg,#6366f1,#4f46e5); border:none; color:white; padding:12px 24px; border-radius:14px; cursor:pointer; font-weight:700; font-size:0.85rem; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); transition: all 0.3s;">
                            <i class="fas fa-crown"></i> ESTABLECER JERARQUÍA
                        </button>
                        <button id="addUserBtn" style="background: #3b82f6; color: white; border: none; padding: 12px 28px; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3); transition: all 0.3s;">
                            <i class="fas fa-plus"></i> NUEVO USUARIO
                        </button>
                    </div>
                </div>

                <div class="card-body" style="padding: 2rem;">
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                        <div id="adminExportTools" style="display:flex; gap:12px; align-items:center;">
                            <span style="color:#64748b; font-size:0.75rem; font-weight:800; text-transform: uppercase; letter-spacing: 1px;">Backup de Seguridad:</span>
                            <button onclick="window.downloadTable('usuarios')" style="background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); color:#94a3b8; font-size:0.75rem; padding:8px 16px; border-radius:10px; cursor:pointer; transition: all 0.2s;">
                                <i class="fas fa-file-export"></i> Descargar JSON
                            </button>
                        </div>
                    </div>

                    <div class="admin-table-wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Identidad del Usuario</th>
                                    <th>Credenciales</th>
                                    <th>Nivel de Acceso</th>
                                    <th style="text-align: right;">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="adminTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { Auth, ALL_PERMISSIONS } from './js/core/auth.js';

        const auth = new Auth();

        if (!auth.loadSession()) {
            window.location.href = 'login.html';
        }

        const currentUser = auth.getCurrentUser();
        
        if (!currentUser.isMaster && !currentUser.permissions?.includes('admin')) {
            alert('⚠️ No tienes permisos de administrador');
            window.location.href = 'index.html';
        }

        const displaySpan = document.getElementById('currentUserDisplay');
        if (displaySpan) {
            displaySpan.textContent = `👤 ${currentUser.username}${currentUser.isMaster ? ' (MASTER)' : ''}`;
        }

        async function renderUsers() {
            const tableBody = document.getElementById('adminTableBody');
            const users = await auth.getAllUsers();
            
            if (users.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:4rem; color:#64748b;">No hay usuarios registrados</td></tr>';
                return;
            }
            
            tableBody.innerHTML = users.map(user => {
                const isCurrentUser = user.id === currentUser.id;
                const permissionBadges = renderPermissionBadges(user);
                      return `
                    <tr data-id="${user.id}">
                        <td>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div style="width:38px; height:38px; border-radius:50%; background:${user.is_master ? 'linear-gradient(135deg,#f59e0b,#d97706)' : 'rgba(255,255,255,0.05)'}; display:flex; align-items:center; justify-content:center; color:white; font-weight:800; font-size:0.9rem; border:2px solid rgba(255,255,255,0.05);">
                                    ${user.username.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <div style="font-weight:700; color:#fff; font-size:0.95rem;">${escapeHtml(user.username)}</div>
                                    <div style="font-size:0.7rem; color:#64748b; margin-top:2px;">UID: ${user.id}</div>
                                </div>
                                ${user.is_master ? ' <span class="permission-badge master" style="margin-left:5px;">👑 MASTER</span>' : ''}
                                ${isCurrentUser ? ' <span style="font-size:0.65rem; color:#3b82f6; font-weight:bold; background:rgba(59,130,246,0.1); padding:2px 6px; border-radius:4px;">(SESIÓN ACTUAL)</span>' : ''}
                            </div>
                        </td>
                        <td>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <input type="password" class="password-placeholder" value="********" disabled style="background:transparent; border:none; color:#475569; width:70px; font-size:0.9rem; letter-spacing:2px;">
                                <button class="admin-btn show-password" data-username="${escapeHtml(user.username)}" data-password="${user.password || ''}" style="width:32px; height:32px; font-size:0.8rem; border-radius:8px;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </td>
                        <td class="user-permissions">
                            <div style="display:flex; flex-wrap:wrap; gap:4px; max-width:400px;">
                                ${permissionBadges}
                            </div>
                        </td>
                        <td style="text-align: right;">
                            <div style="display:flex; gap:8px; justify-content:flex-end;">
                                <button class="admin-btn edit-user" data-id="${user.id}" data-username="${escapeHtml(user.username)}" data-permissions='${JSON.stringify(user.permisos || [])}' data-ismaster="${user.is_master}" data-password="${user.password || ''}">
                                    <i class="fas fa-pen-to-square"></i>
                                </button>
                                ${!user.is_master ? `
                                    <button class="admin-btn delete delete-user" data-id="${user.id}" data-username="${escapeHtml(user.username)}">
                                        <i class="fas fa-trash-can"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            
            document.querySelectorAll('.edit-user').forEach(btn => {
                btn.onclick = () => showUserModal({
                    id: btn.dataset.id,
                    username: btn.dataset.username,
                    permissions: JSON.parse(btn.dataset.permissions),
                    isMaster: btn.dataset.ismaster === 'true',
                    password: btn.dataset.password
                });
            });
            
            document.querySelectorAll('.delete-user').forEach(btn => {
                btn.onclick = () => deleteUser(btn.dataset.id, btn.dataset.username);
            });
            
            document.querySelectorAll('.show-password').forEach(btn => {
                btn.onclick = () => {
                    const username = btn.dataset.username;
                    const password = btn.dataset.password;
                    if (password) {
                        alert(`🔐 Contraseña de "${username}": ${password}`);
                    } else {
                        alert('❌ No se pudo obtener la contraseña');
                    }
                };
            });
        }
        
        function renderPermissionBadges(user) {
            if (user.is_master) {
                return '<span class="permission-badge master" style="background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(245,158,11,0.05)); border:1px solid rgba(245,158,11,0.2); color:#f59e0b;"><i class="fas fa-crown"></i> PRIVILEGIOS TOTALES</span>';
            }
            
            const permissionNames = {
                cyclicHub: 'Auditoría Cíclica',
                comparator: 'Auditoría Directa',
                history: 'Bandeja',
                paletteValidator: 'Validar Paleta',
                assignment: 'Asignación',
                reports: 'Reportes',
                admin: 'Admin',
                editCatalog: 'Editar Catálogo',
                dashboard: 'Dashboard'
            };
            
            const badges = (user.permisos || [])
                .filter(p => permissionNames[p])
                .map(perm => `<span class="permission-badge">${permissionNames[perm]}</span>`);
            
            return badges.length > 0 ? badges.join('') : '<span style="color:#475569; font-size:0.75rem; font-style:italic;">Acceso Restringido</span>';
        }
        
        function showUserModal(userToEdit = null) {
            const isEditing = !!userToEdit;
            const isMaster = userToEdit?.isMaster;
            
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content" style="width:95%; max-width:600px;">
                    <div class="modal-header" style="background: ${isMaster ? 'linear-gradient(135deg,#f59e0b,#d97706)' : 'linear-gradient(135deg,#3b82f6,#1d4ed8)'}; padding:2rem; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h3 style="color: white; margin:0; font-size:1.5rem; font-weight:900; letter-spacing:-0.5px; display:flex; align-items:center; gap:12px;">
                                ${isEditing ? (isMaster ? '<i class="fas fa-crown"></i> PERFIL MASTER' : '<i class="fas fa-user-gear"></i> EDITAR OPERADOR') : '<i class="fas fa-user-plus"></i> NUEVO OPERADOR'}
                            </h3>
                            <p style="color:rgba(255,255,255,0.7); font-size:0.8rem; margin:5px 0 0 0; font-weight:500;">Configuración de identidad y permisos de sistema</p>
                        </div>
                        <button class="modal-close" style="background:rgba(255,255,255,0.1); border:none; color: white; width:36px; height:36px; border-radius:50%; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s;">&times;</button>
                    </div>
                    
                    <div class="modal-body" style="padding:2.5rem;">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin-bottom:2.5rem;">
                            <div class="form-group">
                                <label style="display:block; color:#64748b; font-size:0.7rem; font-weight:800; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px;">Nombre de Usuario</label>
                                <div style="position:relative;">
                                    <i class="fas fa-user" style="position:absolute; left:15px; top:15px; color:#3b82f6; font-size:0.9rem;"></i>
                                    <input type="text" id="modalUsername" value="${userToEdit ? escapeHtml(userToEdit.username) : ''}" ${isEditing ? 'disabled' : ''} 
                                           style="width:100%; background:rgba(15,23,42,0.4); border:1px solid rgba(255,255,255,0.08); color:white; padding:14px 14px 14px 45px; border-radius:14px; font-weight:700; box-sizing:border-box; ${isEditing ? 'opacity:0.6;' : ''}">
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label style="display:block; color:#64748b; font-size:0.7rem; font-weight:800; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px;">Contraseña Segura</label>
                                <div style="position:relative;">
                                    <i class="fas fa-lock" style="position:absolute; left:15px; top:15px; color:#3b82f6; font-size:0.9rem;"></i>
                                    <input type="password" id="modalPassword" value="${userToEdit?.password || ''}" placeholder="${isEditing ? '••••••••' : 'Mínimo 6 caracteres'}"
                                           style="width:100%; background:rgba(15,23,42,0.4); border:1px solid rgba(255,255,255,0.08); color:white; padding:14px 45px 14px 45px; border-radius:14px; box-sizing:border-box;">
                                    <i class="fas fa-eye-slash toggle-password" style="position:absolute; right:15px; top:15px; color:#475569; cursor:pointer; font-size:1.1rem; transition:0.2s;"></i>
                                </div>
                            </div>
                        </div>

                        <div style="margin-top:2rem;">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.05);">
                                <h4 style="color:#3b82f6; font-size:0.8rem; font-weight:900; margin:0; display:flex; align-items:center; gap:10px; text-transform:uppercase; letter-spacing:1px;">
                                    <i class="fas fa-shield-halved"></i> Módulos Autorizados
                                </h4>
                                <span style="font-size:0.7rem; color:#64748b; font-weight:600;">Seleccione los accesos permitidos</span>
                            </div>
                            <div class="permissions-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px; background:rgba(15,23,42,0.2); padding:1.5rem; border-radius:20px; border:1px solid rgba(255,255,255,0.03);">
                                ${[
                                    {v:'cyclicHub', l:'Auditoría Cíclica', i:'fa-sync'},
                                    {v:'comparator', l:'Auditoría Directa', i:'fa-shield-check'},
                                    {v:'history', l:'Bandeja de Entrada', i:'fa-inbox'},
                                    {v:'paletteValidator', l:'Validar Paletas', i:'fa-palette'},
                                    {v:'assignment', l:'Asignación Órdenes', i:'fa-tasks'},
                                    {v:'reports', l:'Reportes de Prod.', i:'fa-chart-line'},
                                    {v:'dashboard', l:'Dashboard General', i:'fa-gauge-high'},
                                    {v:'editCatalog', l:'Editar Catálogos', i:'fa-database'},
                                    {v:'admin', l:'Panel Administrador', i:'fa-user-lock'}
                                ].map(p => `
                                    <label style="display:flex; align-items:center; gap:12px; color:#cbd5e1; font-size:0.85rem; cursor:pointer; padding:10px 15px; border-radius:12px; transition:all 0.2s; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.02);">
                                        <input type="checkbox" value="${p.v}" ${userToEdit?.permissions?.includes(p.v) ? 'checked' : ''} 
                                               style="width:18px; height:18px; accent-color:#3b82f6; cursor:pointer;">
                                        <i class="fas ${p.i}" style="width:20px; text-align:center; color:#64748b; font-size:0.8rem;"></i>
                                        <span style="font-weight:500;">${p.l}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <div class="modal-footer" style="padding:2rem 2.5rem; background:rgba(15,23,42,0.4); display:flex; gap:1.5rem; justify-content:flex-end; border-top:1px solid rgba(255,255,255,0.05);">
                        <button class="cancel-modal" style="background:transparent; border:1.5px solid rgba(255,255,255,0.1); color:#94a3b8; padding:14px 30px; border-radius:14px; cursor:pointer; font-weight:700; transition:0.2s;">Cerrar Ventana</button>
                        <button class="confirm-modal" style="background:${isMaster ? 'linear-gradient(135deg,#f59e0b,#d97706)' : 'linear-gradient(135deg,#3b82f6,#1d4ed8)'}; border:none; padding:14px 40px; border-radius:14px; cursor:pointer; color:white; font-weight:800; box-shadow:0 10px 20px rgba(59, 130, 246, 0.3); transition:all 0.3s;">
                            ${isEditing ? 'ACTUALIZAR DATOS' : 'CREAR OPERADOR'}
                        </button>
                    </div>
                </div>
            `;            
            document.body.appendChild(modal);
            setTimeout(() => modal.classList.add('active'), 10);
            
            const closeModal = () => {
                modal.classList.remove('active');
                setTimeout(() => modal.remove(), 300);
            };
            
            const togglePassword = modal.querySelector('.toggle-password');
            const passwordInput = modal.querySelector('#modalPassword');
            if (togglePassword) {
                togglePassword.onclick = () => {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    togglePassword.classList.toggle('fa-eye');
                    togglePassword.classList.toggle('fa-eye-slash');
                    togglePassword.style.color = type === 'text' ? '#3b82f6' : '#475569';
                };
            }
            
            modal.querySelector('.modal-close').onclick = closeModal;
            modal.querySelector('.cancel-modal').onclick = closeModal;
            
            modal.querySelector('.confirm-modal').onclick = async () => {
                const username = modal.querySelector('#modalUsername').value.trim();
                let password = modal.querySelector('#modalPassword').value;
                let permissions = [];
                let isMaster = userToEdit ? userToEdit.isMaster : false;
                
                const checkboxes = modal.querySelectorAll('.permissions-grid input:checked');
                permissions = Array.from(checkboxes).map(cb => cb.value);
                
                if (!username) {
                    alert('⚠️ Debe ingresar un nombre de usuario.');
                    return;
                }
                
                if (!isEditing && !password) {
                    alert('⚠️ Debe ingresar una contraseña.');
                    return;
                }
                
                if (isEditing && password === '********') {
                    password = null;
                }
                
                const confirmBtn = modal.querySelector('.confirm-modal');
                const originalText = confirmBtn.innerHTML;
                confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESANDO...';
                confirmBtn.disabled = true;
                
                try {
                    if (isEditing && userToEdit) {
                        const updates = {};
                        if (password) updates.password = password;
                        updates.permissions = permissions;
                        updates.isMaster = isMaster;
                        
                        const result = await auth.updateUser(userToEdit.id, updates);
                        if (result.success) {
                            closeModal();
                            await renderUsers();
                        } else {
                            alert(`❌ Error: ${result.error}`);
                        }
                    } else {
                        const result = await auth.createUser(username, password, permissions, isMaster);
                        if (result.success) {
                            closeModal();
                            await renderUsers();
                        } else {
                            alert(`❌ Error: ${result.error}`);
                        }
                    }
                } catch (error) {
                    alert(`❌ Error inesperado: ${error.message}`);
                } finally {
                    confirmBtn.innerHTML = originalText;
                    confirmBtn.disabled = false;
                }
            };
            
            modal.onclick = (e) => { if (e.target === modal) closeModal(); };
        }
        
        async function deleteUser(id, username) {
            if (!confirm(`¿Estás seguro de que quieres eliminar al usuario "${username}"?`)) return;
            
            try {
                const result = await auth.deleteUser(id);
                if (result.success) {
                    await renderUsers();
                } else {
                    alert(`❌ Error: ${result.error}`);
                }
            } catch (error) {
                alert(`❌ Error inesperado: ${error.message}`);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        
        document.getElementById('addUserBtn').onclick = () => showUserModal();
        document.getElementById('backBtn').onclick = () => window.location.href = 'index.html';
        document.getElementById('logoutBtn').onclick = () => {
            auth.logout();
            window.location.href = 'login.html';
        };

        window.downloadTable = async (tableName) => {
            const { supabase } = await import('./js/core/supabaseClient.js');
            try {
                const { data, error } = await supabase.from(tableName).select('*');
                if (error) throw error;
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_${tableName}_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                alert('❌ Error al descargar: ' + err.message);
            }
        };

        const migrateBtn = document.getElementById('migrateMasterBtn');
        if (currentUser.isMaster) {
            migrateBtn.style.display = 'inline-flex';
            migrateBtn.onclick = async () => {
                const { supabase } = await import('./js/core/supabaseClient.js');
                const users = await auth.getAllUsers();
                const otherMasters = users.filter(u => u.is_master && u.id !== currentUser.id);

                if (otherMasters.length === 0) {
                    alert('ℹ️ No hay otros usuarios MASTER que convertir. La jerarquía ya está correcta.');
                    return;
                }

                const names = otherMasters.map(u => u.username).join('\n  • ');
                if (!confirm(`⚠️ ESTABLECER JERARQUÍA\n\nEstos usuarios cambiarán de MASTER → COMPLETO:\n  • ${names}\n\nMantendrán acceso a todas las secciones, pero SOLO TÚ (MASTER) podrás editarlos.\n\n¿Continuar?`)) return;

                migrateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
                migrateBtn.disabled = true;

                let ok = 0;
                for (const user of otherMasters) {
                    const { error } = await supabase
                        .from('usuarios')
                        .update({ is_master: false, permisos: ALL_PERMISSIONS })
                        .eq('id', user.id);
                    if (!error) ok++;
                }

                migrateBtn.innerHTML = '<i class="fas fa-crown"></i> ESTABLECER JERARQUÍA';
                migrateBtn.disabled = false;

                if (ok > 0) {
                    await renderUsers();
                }
            };
        }
        
        renderUsers();
    </script>
</body>
</html>
