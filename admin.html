<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Color Match - Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030308);
            font-family: 'Rubik', system-ui, sans-serif;
            min-height: 100vh;
            padding: 1.5rem;
            color: #eef2ff;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: #0c0c12;
            border: 1px solid #2d3748;
            border-radius: 12px;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .admin-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00e5ff, #0099cc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .admin-header h1 i {
            margin-right: 0.5rem;
            color: #00e5ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #currentUserDisplay {
            font-size: 0.8rem;
            color: #00e5ff;
            background: rgba(0, 229, 255, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
        }

        .logout-btn, .back-btn {
            background: transparent;
            border: 1px solid #9ca3af;
            color: #9ca3af;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover, .back-btn:hover {
            border-color: #f87171;
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .admin-section {
            background: #0c0c12;
            border: 1px solid #2d3748;
            border-radius: 12px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .admin-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #111117;
            border-bottom: 1px solid #2d3748;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .admin-section-header h3 {
            font-size: 1rem;
            color: #eab308;
        }

        .admin-section-header h3 i {
            margin-right: 0.5rem;
            color: #00e5ff;
        }

        .btn-primary {
            background: transparent;
            border: 1.5px solid #00e5ff;
            color: #00e5ff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: rgba(0, 229, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: transparent;
            border: 1.5px solid #f87171;
            color: #f87171;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.1);
            transform: translateY(-1px);
        }

        .admin-table-wrapper {
            overflow-x: auto;
            padding: 0.5rem;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .admin-table th {
            background: #1a1a2a;
            padding: 0.75rem;
            text-align: left;
            color: #9ca3af;
            border-bottom: 1px solid #2d3748;
        }

        .admin-table td {
            padding: 0.75rem;
            border-bottom: 1px solid #1e1e2c;
            vertical-align: middle;
        }

        .admin-table tr:hover {
            background: rgba(0, 229, 255, 0.05);
        }

        .permission-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.65rem;
            font-weight: 500;
            margin: 0.1rem;
        }

        .permission-badge.allowed {
            background: rgba(21, 128, 61, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .permission-badge.denied {
            background: rgba(153, 27, 27, 0.2);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .permission-badge.master {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .admin-btn {
            background: transparent;
            border: none;
            color: #00e5ff;
            font-size: 1rem;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            margin: 0 0.1rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .admin-btn:hover {
            background: rgba(0, 229, 255, 0.15);
        }

        .admin-btn.delete {
            color: #f87171;
        }

        .admin-btn.delete:hover {
            background: rgba(248, 113, 113, 0.15);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
        }

        .modal-content {
            background: #0c0c12;
            border: 1px solid #2d3748;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1rem;
            color: white;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: #9ca3af;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-buttons {
            padding: 1rem 1.5rem;
            border-top: 1px solid #2d3748;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 0.25rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.5rem;
            background: #1e1e2c;
            border: 1px solid #4b5563;
            border-radius: 6px;
            color: white;
            font-size: 0.85rem;
        }

        .permissions-checkboxes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .permissions-checkboxes label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #e2e8f0;
            cursor: pointer;
        }

        .permissions-checkboxes input {
            width: auto;
        }

        .password-group {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-cog"></i> Administración de Usuarios</h1>
            <div class="user-info">
                <span id="currentUserDisplay"></span>
                <button id="backBtn" class="back-btn"><i class="fas fa-arrow-left"></i> Volver</button>
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
            </div>
        </div>

        <div class="admin-section">
            <div class="admin-section-header">
                <h3><i class="fas fa-users"></i> Gestión de Usuarios</h3>
                <button id="addUserBtn" class="btn-primary"><i class="fas fa-plus"></i> Crear Usuario</button>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr><th>Usuario</th><th>Contraseña</th><th>Permisos</th><th>Acciones</th>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { Auth, ALL_PERMISSIONS, PERMISSIONS } from './js/core/auth.js';

        const auth = new Auth();

        // Verificar autenticación
        if (!auth.loadSession()) {
            window.location.href = 'login.html';
        }

        const currentUser = auth.getCurrentUser();
        
        // Verificar que sea administrador
        if (!currentUser.isMaster && !currentUser.permissions?.includes('admin')) {
            alert('⚠️ No tienes permisos de administrador');
            window.location.href = 'index.html';
        }

        // Mostrar usuario actual
        const displaySpan = document.getElementById('currentUserDisplay');
        if (displaySpan) {
            displaySpan.textContent = `👤 ${currentUser.username}${currentUser.isMaster ? ' (MASTER)' : ''}`;
        }

        // Renderizar tabla
        function renderUsers() {
            const tableBody = document.getElementById('adminTableBody');
            const users = auth.getAllUsers();
            
            if (users.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" class="empty-state">No hay usuarios registrados<\/td><\/tr>';
                return;
            }
            
            tableBody.innerHTML = users.map(user => {
                const isCurrentUser = user.id === currentUser.id;
                const permissionBadges = renderPermissionBadges(user);
                
                return `
                    <tr data-id="${user.id}">
                        <td><strong>${escapeHtml(user.username)}</strong>${user.isMaster ? ' <span class="permission-badge master">👑 MASTER</span>' : ''}${isCurrentUser ? ' <span class="permission-badge allowed">(tú)</span>' : ''}<\/td>
                        <td><input type="password" class="password-placeholder" value="********" disabled style="background:transparent; border:none; color:#9ca3af; width:100px;"><button class="admin-btn show-password" data-username="${escapeHtml(user.username)}" style="font-size:0.7rem;"><i class="fas fa-eye"></i><\/button><\/td>
                        <td class="user-permissions">${permissionBadges}<\/td>
                        <td class="admin-actions-cell">
                            <button class="admin-btn edit-user" data-id="${user.id}" data-username="${escapeHtml(user.username)}" data-permissions='${JSON.stringify(user.permissions)}' data-ismaster="${user.isMaster}"><i class="fas fa-edit"><\/i><\/button>
                            ${!user.isMaster ? `<button class="admin-btn delete delete-user" data-id="${user.id}" data-username="${escapeHtml(user.username)}"><i class="fas fa-trash"><\/i><\/button>` : ''}
                        <\/td>
                    </tr>
                `;
            }).join('');
            
            // Event listeners
            document.querySelectorAll('.edit-user').forEach(btn => {
                btn.onclick = () => showUserModal({
                    id: parseInt(btn.dataset.id),
                    username: btn.dataset.username,
                    permissions: JSON.parse(btn.dataset.permissions),
                    isMaster: btn.dataset.ismaster === 'true'
                });
            });
            
            document.querySelectorAll('.delete-user').forEach(btn => {
                btn.onclick = () => deleteUser(parseInt(btn.dataset.id), btn.dataset.username);
            });
            
            document.querySelectorAll('.show-password').forEach(btn => {
                btn.onclick = () => {
                    const username = btn.dataset.username;
                    const user = auth.getUser(username);
                    if (user) {
                        alert(`🔒 Contraseña de "${username}": ${user.password}`);
                    }
                };
            });
        }
        
        function renderPermissionBadges(user) {
            if (user.isMaster) {
                return '<span class="permission-badge master">✅ Acceso total</span>';
            }
            
            const badges = [];
            const permissionNames = {
                comparator: 'Comparar',
                history: 'Bandeja',
                creator: 'Crear TXT',
                eps: 'EPS',
                development: 'Desarrollo',
                assignment: 'Asignación',
                admin: 'Admin'
            };
            
            for (const perm of ALL_PERMISSIONS) {
                const hasPerm = user.permissions?.includes(perm);
                badges.push(`<span class="permission-badge ${hasPerm ? 'allowed' : 'denied'}">${hasPerm ? '✅' : '❌'} ${permissionNames[perm]}</span>`);
            }
            
            return badges.join('');
        }
        
        function showUserModal(userToEdit = null) {
            const isEditing = !!userToEdit;
            const isEditingMaster = isEditing && userToEdit.isMaster;
            
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header" style="background: ${isEditingMaster ? '#b45309' : '#2d4ed6'};">
                        <h3 style="color: white;">${isEditing ? (isEditingMaster ? '👑 Editar Usuario MASTER' : '✏️ Editar Usuario') : '➕ Crear Nuevo Usuario'}</h3>
                        <button class="modal-close" style="color: white;">&times;</button>
                    </div>
                    <div class="modal-body">
                        ${isEditingMaster ? '<div style="background: rgba(180, 83, 9, 0.2); border: 1px solid #b45309; border-radius: 0.5rem; padding: 0.75rem; margin-bottom: 1rem;"><p style="color: #fbbf24; margin: 0; font-size: 0.8rem;">⚠️ El usuario MASTER tiene acceso total. No se pueden modificar sus permisos.</p></div>' : ''}
                        
                        <div class="form-group">
                            <label>👤 Usuario:</label>
                            <input type="text" id="modalUsername" value="${userToEdit ? escapeHtml(userToEdit.username) : ''}" ${isEditing ? 'disabled' : ''} placeholder="Ej: juan_perez">
                        </div>
                        
                        <div class="form-group">
                            <label>🔒 Contraseña:</label>
                            <div class="password-group">
                                <input type="password" id="modalPassword" value="${userToEdit ? '********' : ''}" placeholder="${isEditing ? 'Dejar vacío para mantener' : 'Ingrese contraseña'}">
                                <i class="fas fa-eye-slash toggle-password"></i>
                            </div>
                            <small style="color: #6b7280;">${isEditing ? 'Dejar vacío para mantener la misma contraseña' : 'Mínimo 6 caracteres'}</small>
                        </div>
                        
                        ${!isEditingMaster ? `
                        <div class="permissions-group">
                            <h4 style="color: #eab308; font-size: 0.85rem; margin-bottom: 0.5rem;">📋 Permisos de acceso:</h4>
                            <div class="permissions-checkboxes">
                                <label><input type="checkbox" value="comparator" ${userToEdit?.permissions?.includes('comparator') ? 'checked' : ''}> Comparar</label>
                                <label><input type="checkbox" value="history" ${userToEdit?.permissions?.includes('history') ? 'checked' : ''}> Bandeja</label>
                                <label><input type="checkbox" value="creator" ${userToEdit?.permissions?.includes('creator') ? 'checked' : ''}> Crear TXT</label>
                                <label><input type="checkbox" value="eps" ${userToEdit?.permissions?.includes('eps') ? 'checked' : ''}> EPS</label>
                                <label><input type="checkbox" value="development" ${userToEdit?.permissions?.includes('development') ? 'checked' : ''}> Desarrollo</label>
                                <label><input type="checkbox" value="assignment" ${userToEdit?.permissions?.includes('assignment') ? 'checked' : ''}> Asignación</label>
                                <label><input type="checkbox" value="admin" ${userToEdit?.permissions?.includes('admin') ? 'checked' : ''}> Admin</label>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                    <div class="modal-buttons">
                        <button class="btn-secondary cancel-modal" style="background: transparent; border: 1.5px solid #9ca3af; color: #9ca3af; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;">Cancelar</button>
                        <button class="btn-primary confirm-modal" style="background: ${isEditingMaster ? '#b45309' : '#2d4ed6'}; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; color: white;">${isEditing ? 'Guardar cambios' : 'Crear Usuario'}</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            setTimeout(() => modal.classList.add('active'), 10);
            
            const closeModal = () => {
                modal.classList.remove('active');
                setTimeout(() => modal.remove(), 300);
            };
            
            // Toggle password
            const togglePassword = modal.querySelector('.toggle-password');
            const passwordInput = modal.querySelector('#modalPassword');
            if (togglePassword) {
                togglePassword.onclick = () => {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    togglePassword.classList.toggle('fa-eye');
                    togglePassword.classList.toggle('fa-eye-slash');
                };
            }
            
            modal.querySelector('.modal-close').onclick = closeModal;
            modal.querySelector('.cancel-modal').onclick = closeModal;
            
            modal.querySelector('.confirm-modal').onclick = () => {
                const username = modal.querySelector('#modalUsername').value.trim();
                let password = modal.querySelector('#modalPassword').value;
                let permissions = [];
                
                if (!isEditingMaster) {
                    const checkboxes = modal.querySelectorAll('.permissions-checkboxes input:checked');
                    permissions = Array.from(checkboxes).map(cb => cb.value);
                } else {
                    permissions = ALL_PERMISSIONS;
                }
                
                if (!username) {
                    alert('⚠️ Debe ingresar un nombre de usuario.');
                    return;
                }
                
                if (!isEditing && !password) {
                    alert('⚠️ Debe ingresar una contraseña.');
                    return;
                }
                
                if (!isEditing && password.length < 6) {
                    alert('⚠️ La contraseña debe tener al menos 6 caracteres.');
                    return;
                }
                
                if (isEditing && password === '********') {
                    password = null;
                }
                
                if (isEditing && userToEdit) {
                    const updates = {};
                    if (password) updates.password = password;
                    if (!isEditingMaster) updates.permissions = permissions;
                    
                    const result = auth.updateUser(userToEdit.id, updates);
                    if (result.success) {
                        alert(`✅ Usuario "${username}" actualizado correctamente.`);
                        closeModal();
                        renderUsers();
                        if (currentUser.id === userToEdit.id && password) {
                            alert('⚠️ Tu contraseña ha sido cambiada. Por favor inicia sesión nuevamente.');
                            auth.logout();
                            window.location.href = 'login.html';
                        }
                    } else {
                        alert(`❌ Error: ${result.error}`);
                    }
                } else {
                    const result = auth.createUser(username, password, permissions, false);
                    if (result.success) {
                        alert(`✅ Usuario "${username}" creado correctamente.`);
                        closeModal();
                        renderUsers();
                    } else {
                        alert(`❌ Error: ${result.error}`);
                    }
                }
            };
            
            modal.onclick = (e) => { if (e.target === modal) closeModal(); };
        }
        
        function deleteUser(id, username) {
            if (confirm(`¿Estás seguro de que quieres eliminar al usuario "${username}"?`)) {
                const result = auth.deleteUser(id);
                if (result.success) {
                    alert(`✅ Usuario "${username}" eliminado.`);
                    renderUsers();
                } else {
                    alert(`❌ Error: ${result.error}`);
                }
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        
        // Eventos de navegación
        document.getElementById('addUserBtn').onclick = () => showUserModal();
        document.getElementById('backBtn').onclick = () => window.location.href = 'index.html';
        document.getElementById('logoutBtn').onclick = () => {
            auth.logout();
            window.location.href = 'login.html';
        };
        
        renderUsers();
    </script>
</body>
</html>
